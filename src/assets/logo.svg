<!-- src/components/Logo.astro -->
<svg width="200" height="50" viewBox="0 0 200 50" xmlns="http://www.w3.org/2000/svg">
  <!-- Terminal window -->
  <rect width="200" height="50" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  
  <!-- Terminal dots -->
  <circle cx="14" cy="12" r="4" fill="#EF4444"/>
  <circle cx="28" cy="12" r="4" fill="#EAB308"/>
  <circle cx="42" cy="12" r="4" fill="#22C55E"/>
  
  <!-- Terminal text -->
  <text x="14" y="40" font-family="monospace" font-size="16" fill="#22C55E">$</text>
  <text x="30" y="40" font-family="monospace" font-size="16" fill="#F8FAFC">rishikesh_k</text>
  <rect x="155" y="27" width="10" height="16" fill="#22C55E" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>